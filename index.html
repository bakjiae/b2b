<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="style.css">
    <title>링고라 튜터링 - 기업 외국어 교육 올인원 솔루션</title>
</head>

<body>
    <button class="announcement-bar">
        <div class="inner">
            <p><em>기업 외국어 교육 파일럿</em> 부담 없이 <em>무료</em>로 직접 체험해 보세요 →</p>
        </div>
    </button>
    <header class="header">
        <div class="inner">
            <nav class="nav" aria-label="주요 메뉴">
                <a class="logo" href="#"><img src="img/logo_lingora_tutoring.svg" alt="Lingora Tutoring"></a>
                <ul>
                    <li><button class="btn ghost">서비스 소개</button></li>
                    <li><button class="btn ghost">운영 프로세스</button></li>
                    <li><button class="btn ghost">도입 사례</button></li>
                    <li><button class="btn ghost">FAQ</button></li>
                </ul>
            </nav>
            <div class="header-actions">
                <button class="btn border">무료 파일럿 신청</button>
                <button class="btn">도입 문의하기</button>
            </div>
        </div>
    </header>
    <main class="main">
        <section class="hero">
            <div class="inner">
                <div class="hero-visual">
                    <div class="line">
                        <div class="rec sqaure pc_only"></div>
                        <div class="rec sqaure"></div>
                        <div>임직원 외국어 교육</div>
                        <div class="rec gradient_01">
                            <img src="img/img_visual_ai.svg" alt="">
                        </div>
                    </div>
                    <div class="line">
                        <div class="rec gradient_02">
                            <img src="img/img_visual_oneonone.svg" alt="">
                            <img class="pc_only" src="img/img_visual_onsite.svg" alt="">
                        </div>
                        <div>이제 <em>하나로</em> 끝내세요.</div>
                        <div class="rec sqaure green">
                            <img class="mobile_only" src="img/img_visual_onsite.svg" alt="">
                        </div>
                    </div>
                    <div class="line">
                        <div class="rec sqaure pc_only"></div>
                        <div class="rec pc_only"></div>
                        <div class="rec pc_only"></div>
                        <div class="rec gradient_01"></div>
                        <div class="rec sqaure green"></div>
                        <div class="rec last"></div>
                    </div>
                    <div class="animation">
                        <div class="bg pc_only">
                            <svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" width="618" height="208"
                                viewBox="0 0 618 208" fill="none">
                                <path id="hero-line"
                                    d="M0 16 H76 C96 16 109 22 116 31 C123 40 127 51 127 67 V124 C127 141 132 158 144 170 C156 182 173 192 195 192 H602"
                                    fill="none" stroke="url(#paint0_linear_45516_162)" stroke-width="32"
                                    stroke-linecap="butt" stroke-linejoin="round" pathLength="1000" />
                                <circle class="line-end-cap" cx="602" cy="192" r="16" fill="#06BF9D" />
                                <defs>
                                    <linearGradient id="paint0_linear_45516_162" x1="0" y1="104" x2="602" y2="104"
                                        gradientUnits="userSpaceOnUse">
                                        <stop stop-color="#C2A9FA" />
                                        <stop offset="1" stop-color="#06BF9D" />
                                    </linearGradient>
                                </defs>
                            </svg>
                        </div>
                        <div class="bg mobile_only">
                            <svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" width="618" height="208"
                                viewBox="0 0 618 208" fill="none">
                                <path id="hero-line-mobile" d="M0 192 H602" fill="none"
                                    stroke="url(#paint0_linear_mobile)" stroke-width="32" stroke-linecap="butt"
                                    stroke-linejoin="round" pathLength="1000" />
                                <circle class="line-end-cap line-end-cap--mobile" cx="602" cy="192" r="16"
                                    fill="#06BF9D" />
                                <defs>
                                    <linearGradient id="paint0_linear_mobile" x1="0" y1="104" x2="602" y2="104"
                                        gradientUnits="userSpaceOnUse">
                                        <stop stop-color="#C2A9FA" />
                                        <stop offset="1" stop-color="#06BF9D" />
                                    </linearGradient>
                                </defs>
                            </svg>
                        </div>
                        <div class="glow pc_only">
                            <svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" width="618" height="208"
                                viewBox="0 0 618 208" fill="none">
                                <g opacity="0.6" style="mix-blend-mode:plus-lighter" filter="url(#glowBlur6)"
                                    transform="translate(6 0) scale(1 1.08)" transform-origin="309 104">
                                    <path id="hero-glow-line"
                                        d="M0 16 H76 C96 16 109 22 116 31 C123 40 127 51 127 67 V124 C127 141 132 158 144 170 C156 182 173 192 195 192 H602"
                                        fill="none" stroke="url(#paint0_linear_45528_165)" stroke-width="2"
                                        stroke-linecap="butt" stroke-linejoin="round" pathLength="1000" />
                                    <circle class="glow-end-cap" cx="602" cy="192" r="1" fill="#0DFFE1" />
                                </g>
                                <defs>
                                    <filter id="glowBlur6" x="-40" y="0" width="698" height="288"
                                        filterUnits="userSpaceOnUse">
                                        <feGaussianBlur stdDeviation="3" />
                                    </filter>
                                    <linearGradient id="paint0_linear_45528_165" x1="0" y1="104" x2="602" y2="104"
                                        gradientUnits="userSpaceOnUse">
                                        <stop stop-color="#C2A9FA" />
                                        <stop offset="1" stop-color="#0DFFE1" />
                                    </linearGradient>
                                </defs>
                            </svg>
                        </div>
                        <div class="glow mobile_only">
                            <svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" width="618" height="208"
                                viewBox="0 0 618 208" fill="none">
                                <g opacity="0.6" style="mix-blend-mode:plus-lighter" filter="url(#glowBlur6m)"
                                    transform="translate(6 0) scale(1 1.08)" transform-origin="309 104">
                                    <path id="hero-glow-line-mobile" d="M0 192 H602" fill="none"
                                        stroke="url(#paint0_linear_45528_165m)" stroke-width="2" stroke-linecap="butt"
                                        stroke-linejoin="round" pathLength="1000" />
                                    <circle class="glow-end-cap glow-end-cap--mobile" cx="602" cy="192" r="1"
                                        fill="#0DFFE1" />
                                </g>
                                <defs>
                                    <filter id="glowBlur6m" x="-40" y="0" width="698" height="288"
                                        filterUnits="userSpaceOnUse">
                                        <feGaussianBlur stdDeviation="3" />
                                    </filter>
                                    <linearGradient id="paint0_linear_45528_165m" x1="0" y1="104" x2="602" y2="104"
                                        gradientUnits="userSpaceOnUse">
                                        <stop stop-color="#C2A9FA" />
                                        <stop offset="1" stop-color="#0DFFE1" />
                                    </linearGradient>
                                </defs>
                            </svg>
                        </div>
                        <div class="dot">
                            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 22 22"
                                fill="none">
                                <path
                                    d="M10.9922 0C12.0968 0 12.9922 0.89543 12.9922 2V6.18945L15.9541 3.22754C16.7352 2.44649 18.0022 2.44649 18.7832 3.22754C19.5638 4.00854 19.5639 5.27472 18.7832 6.05566L15.8311 9.00781H20C21.1046 9.00781 22 9.90324 22 11.0078C21.9998 12.1122 21.1045 13.0078 20 13.0078H15.8457L18.7832 15.9453C19.5641 16.7264 19.5642 17.9924 18.7832 18.7734C18.0022 19.5543 16.7361 19.5543 15.9551 18.7734L12.9922 15.8105V20C12.9922 21.1046 12.0968 22 10.9922 22C9.88762 22 8.99219 21.1046 8.99219 20V15.8457L6.05469 18.7832C5.27364 19.5643 4.00761 19.5643 3.22656 18.7832C2.44564 18.0021 2.44555 16.7361 3.22656 15.9551L6.17383 13.0078H2C0.895532 13.0078 0.000164912 12.1122 0 11.0078C-4.82823e-08 9.90324 0.89543 9.00781 2 9.00781H6.18945L3.22656 6.04492C2.44601 5.26389 2.44581 3.99771 3.22656 3.2168C4.00761 2.43575 5.27461 2.43575 6.05566 3.2168L8.99219 6.15332V2C8.99219 0.89543 9.88762 0 10.9922 0Z"
                                    fill="#0DFFE1" />
                            </svg>
                        </div>
                    </div>
                </div>
                <p class="hero-subcopy"><em>원어민 1:1 회화 · 오프라인 출강 · AI 학습</em>까지<br>현장에서 바로 쓰이는 실전 어학 능력을 만듭니다.</p>
                <div class="hero-cta">
                    <button type="button" class="btn gradient">맞춤 제안받기</button>
                    <button type="button" class="btn border">무료 파일럿 신청하기</button>
                </div>
            </div>
        </section>
    </main>
    <footer class="footer">
        <div class="inner">
            <div class="copyright">
                <p>Copyright 2026</p>
            </div>
        </div>
    </footer>
</body>

</html>
